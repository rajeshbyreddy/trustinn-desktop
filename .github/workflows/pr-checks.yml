name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Check
        id: build
        run: npx next build
        env:
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}

      - name: TypeScript Check
        id: typescript
        run: npx tsc --noEmit

      - name: ESLint Check
        id: eslint
        run: npm run lint 2>&1 || true
        continue-on-error: true

      - name: Comment PR with Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildPassed = '${{ steps.build.outcome }}' === 'success';
            const tsPassed = '${{ steps.typescript.outcome }}' === 'success';
            const lintPassed = '${{ steps.eslint.outcome }}' === 'success';
            
            const body = `## Build & Quality Checks
            
            | Check | Status |
            |-------|--------|
            | **Build** | ${buildPassed ? '✅ Passed' : '❌ Failed'} |
            | **TypeScript** | ${tsPassed ? '✅ Passed' : '❌ Failed'} |
            | **ESLint** | ${lintPassed ? '✅ Passed' : '⚠️ Warnings'} |
            
            Commit: \`${{ github.sha }}\`
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for console warnings/errors in code
        run: |
          echo "Checking for common issues..."
          grep -r "TODO\|FIXME" src/ components/ app/ 2>/dev/null || echo "No TODOs found"
        continue-on-error: true

      - name: Dependency audit
        run: npm audit --audit-level=moderate 2>&1 || true
        continue-on-error: true
