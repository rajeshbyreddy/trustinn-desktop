name: Build Windows .exe

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        shell: pwsh
      
      - name: Build Next.js app
        run: npm run build
        shell: pwsh
      
      - name: Verify Next.js build
        shell: pwsh
        run: |
          if (Test-Path "./out/index.html") {
            Write-Host "✅ Next.js build successful - index.html found"
            Write-Host "📁 Build output contains:"
            Get-ChildItem "./out" | ForEach-Object { Write-Host "  - $($_.Name)" }
          } else {
            Write-Host "❌ Next.js build failed - index.html not found"
            exit 1
          }
      
      - name: Build Windows .exe with electron-builder
        run: npm run build:win
        shell: pwsh
      
      - name: Find .exe file
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "./dist" -Name "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if (-not $exe) {
            Write-Host "❌ ERROR: No .exe found in ./dist"
            Write-Host "📁 Contents of ./dist:"
            Get-ChildItem "./dist" -Recurse | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          
          $exePath = Join-Path "./dist" $exe
          $size = (Get-Item $exePath).Length / 1MB
          
          Write-Host "✅ Found .exe: $exe"
          Write-Host "📦 Size: $([math]::Round($size, 2)) MB"
          
          echo "exe_name=$exe" >> $env:GITHUB_OUTPUT
          echo "exe_path=$exePath" >> $env:GITHUB_OUTPUT
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: trustinn-windows-exe
          path: ${{ steps.find_exe.outputs.exe_path }}
      
      - name: Create and upload release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release summary
        shell: pwsh
        run: |
          Write-Host "✅ Build completed successfully!"
          Write-Host "📁 File: ${{ steps.find_exe.outputs.exe_name }}"
          if (startsWith('${{ github.ref }}', 'refs/tags/')) {
            Write-Host "🔗 Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          } else {
            Write-Host "🔗 Artifact available in workflow run artifacts"
          }
